services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tissueqa
      POSTGRES_USER: tissueqa
      POSTGRES_PASSWORD: tissueqa_dev
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tissueqa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
